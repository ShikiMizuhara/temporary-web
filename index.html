<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye GIF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .gif-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .eye-gif {
            width: 100%;
            max-width: 400px;
            height: auto;
            aspect-ratio: 5/4;
            object-fit: contain;
        }
        
        @media (max-width: 400px) {
            .eye-gif {
                max-width: 90vw;
            }
        }
    </style>
</head>
<body>
    <div class="gif-container">
        <img src="images/eye.gif" alt="" class="eye-gif">
    </div>
</body>
</html>
